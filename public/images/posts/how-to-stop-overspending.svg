<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Decorative Background Glows -->
  <circle cx="400" cy="200" r="200" fill="#3b82f6" opacity="0.03" />
  <circle cx="250" cy="220" r="120" fill="#ef4444" opacity="0.02" />

  <!-- Main Composition Group -->
  <g transform="translate(0, -10)">
    
    <!-- Left Side: Credit Card with Scissors (Cutting Triggers) -->
    <g transform="translate(180, 180) rotate(-10)" filter="url(#shadow)">
      <!-- Credit Card -->
      <rect x="0" y="0" width="200" height="125" rx="12" fill="url(#cardGrad)" stroke="#334155" stroke-width="2" />
      <rect x="24" y="25" width="35" height="25" rx="4" fill="#64748b" opacity="0.5" />
      <rect x="24" y="75" width="110" height="12" rx="3" fill="#334155" />
      <circle cx="155" cy="81" r="14" fill="#ef4444" opacity="0.7" />
      <circle cx="170" cy="81" r="14" fill="#fb923c" opacity="0.7" />
      
      <!-- Conceptual Break / Friction Lines over Card -->
      <path d="M 70 -30 L 110 160" fill="none" stroke="#0f172a" stroke-width="10" />
      <path d="M 70 -30 L 110 160" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 4" />
    </g>

    <!-- Right Side: The 24-Hour Shield (Protection Habit) -->
    <g transform="translate(430, 130)" filter="url(#shadow)">
      <!-- Shield Shape -->
      <path d="M 10 0 L 170 0 C 170 110 90 160 90 160 C 90 160 10 110 10 0 Z" fill="url(#shieldGrad)" stroke="#60a5fa" stroke-width="2" />
      
      <!-- Clock Icon Inside Shield -->
      <circle cx="90" cy="65" r="30" fill="none" stroke="#ffffff" stroke-width="4" />
      <path d="M 90 45 L 90 65 L 108 65" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- 24H Badge Text -->
      <rect x="55" y="112" width="70" height="24" rx="12" fill="#1e3a8a" />
      <text x="90" y="128" font-family="system-ui, sans-serif" font-size="12" font-weight="900" fill="#60a5fa" text-anchor="middle" letter-spacing="1">24h RULE</text>
    </g>

    <!-- Little floating locks / friction icons -->
    <g transform="translate(370, 110)" filter="url(#shadow)">
      <circle cx="15" cy="15" r="15" fill="#10b981" />
      <path d="M 10 16 L 10 12 A 5 5 0 0 1 20 12 L 20 16" fill="none" stroke="#ffffff" stroke-width="2.5" />
      <rect x="7" y="15" width="16" height="10" rx="2" fill="#ffffff" />
    </g>
  </g>

  <!-- Typography -->
  <text x="400" y="375" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Build Smart Spending Friction</text>
  <text x="400" y="402" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Breaking the impulse cycle before it reaches your wallet</text>
</svg>
