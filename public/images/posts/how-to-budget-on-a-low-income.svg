<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Main Interface Dashboard Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Titles Inside UI -->
  <text x="400" y="160" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#ffffff" text-anchor="middle">STRATEGIC LOW-INCOME BUDGETING</text>
  <text x="400" y="190" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#10b981" text-anchor="middle">Priority Optimization Over Deprivation</text>

  <!-- Visualizing Optimized Layered Distribution (Stacked Bar Layout) -->
  <g transform="translate(200, 230)">
    <!-- Baseline Total Frame -->
    <rect x="0" y="0" width="400" height="35" rx="6" fill="#334155" opacity="0.4" stroke="#475569" stroke-width="1"/>
    
    <!-- Segment 1: Housing & Essentials (Takes up majority share) -->
    <rect x="0" y="0" width="260" height="35" rx="6" fill="#0ea5e9" opacity="0.85" />
    <text x="130" y="22" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#ffffff" text-anchor="middle">ESSENTIALS (70%)</text>
    
    <!-- Segment 2: Flexibility / Wants -->
    <rect x="260" y="0" width="90" height="35" fill="#f59e0b" opacity="0.85" />
    <text x="305" y="22" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#ffffff" text-anchor="middle">FLEX (22%)</text>
    
    <!-- Segment 3: Savings / Growth -->
    <path d="M 350,0 L 394,0 A 6,6 0 0 1 400,6 L 400,29 A 6,6 0 0 1 394,35 L 350,35 Z" fill="#10b981" opacity="0.9" />
    <text x="375" y="22" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#ffffff" text-anchor="middle">SAVE (8%)</text>
  </g>
</svg>
