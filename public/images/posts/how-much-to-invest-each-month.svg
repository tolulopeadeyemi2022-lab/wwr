<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)" />

  <g transform="translate(100, 100)">
    <rect x="50" y="200" width="80" height="50" rx="4" fill="#334155" />
    <rect x="180" y="150" width="80" height="100" rx="4" fill="#334155" />
    <rect x="310" y="80" width="80" height="170" rx="4" fill="#334155" />
    <rect x="440" y="20" width="80" height="230" rx="4" fill="url(#barGrad)" />
    
    <line x1="0" y1="250" x2="600" y2="250" stroke="#475569" stroke-width="4" />
  </g>

  <text x="400" y="400" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle">THE POWER OF CONSISTENT INVESTING</text>
