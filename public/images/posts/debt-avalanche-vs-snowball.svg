<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="avalancheGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="snowballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Grid Background Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Main Comparison Interface Card -->
  <rect x="100" y="70" width="600" height="310" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Title Blocks -->
  <text x="400" y="120" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#ffffff" text-anchor="middle">DEBT PAYOFF STRATEGIES</text>
  <text x="400" y="145" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#94a3b8" text-anchor="middle">Math vs. Momentum</text>

  <!-- Split Screen Graphics -->
  <!-- Left Side: Avalanche (Interest Driven) -->
  <g transform="translate(160, 180)">
    <rect x="0" y="0" width="200" height="160" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="100" y="30" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0ea5e9" text-anchor="middle">DEBT AVALANCHE</text>
    
    <!-- Top-Down Attack Representation -->
    <path d="M 60,60 L 140,60 L 100,120 Z" fill="url(#avalancheGrad)" opacity="0.8" />
    <text x="100" y="150" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#cbd5e1" text-anchor="middle">Highest Interest First</text>
  </g>

  <!-- Right Side: Snowball (Balance Driven) -->
  <g transform="translate(440, 180)">
    <rect x="0" y="0" width="200" height="160" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="100" y="30" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#e2e8f0" text-anchor="middle">DEBT SNOWBALL</text>
    
    <!-- Growing Circle Representation -->
    <circle cx="70" cy="90" r="15" fill="url(#snowballGrad)" opacity="0.5" />
    <circle cx="130" cy="90" r="28" fill="url(#snowballGrad)" opacity="0.9" />
    
    <text x="100" y="150" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#cbd5e1" text-anchor="middle">Smallest Balance First</text>
  </g>
</svg>
