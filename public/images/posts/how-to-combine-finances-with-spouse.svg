<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <text x="400" y="160" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#ffffff" text-anchor="middle">SPOUSAL FINANCIAL INTEGRATION</text>
  <text x="400" y="190" font-family="system-ui, sans-serif" font-weight="600" font-size="15" fill="#38bdf8" text-anchor="middle">Step-By-Step Unified Roadmap</text>

  <g transform="translate(180, 230)">
    <rect x="0" y="0" width="120" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <text x="60" y="24" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#94a3b8" text-anchor="middle">1. Disclosure</text>
    
    <path d="M 125,20 L 145,20 M 141,16 L 146,20 L 141,24" stroke="#475569" stroke-width="1.5" fill="none" />
    
    <rect x="150" y="0" width="120" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <text x="210" y="24" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#38bdf8" text-anchor="middle">2. Joint Setup</text>

    <path d="M 275,20 L 295,20 M 291,16 L 296,20 L 291,24" stroke="#475569" stroke-width="1.5" fill="none" />

    <rect x="300" y="0" width="120" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="360" y="24" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#10b981" text-anchor="middle">3. Money Date</text>
  </g>

  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">A Collaborative Framework for Married Couples</text>
</svg>
