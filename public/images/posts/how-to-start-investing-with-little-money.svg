<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Coin/Growth Visual -->
  <circle cx="400" cy="225" r="100" fill="url(#glow)" />
  <circle cx="400" cy="225" r="60" fill="#fbbf24" />
  <path d="M 380 200 L 420 200 M 380 250 L 420 250" stroke="#78350f" stroke-width="4" stroke-linecap="round" />
  
  <text x="400" y="380" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle">START SMALL. GROW BIG.</text>
</svg>
