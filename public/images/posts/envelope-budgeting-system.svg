<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Main Interface Dashboard Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Titles Inside UI -->
  <text x="400" y="155" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#ffffff" text-anchor="middle">ENVELOPE BUDGETING SYSTEM</text>
  <text x="400" y="185" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#10b981" text-anchor="middle">Tangible Limits for Smarter Spending</text>

  <!-- Envelopes Isometric Display Arrangement -->
  <g transform="translate(190, 220)">
    <!-- Envelope 1 (Groceries) -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="110" height="70" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" />
      <path d="M 0,0 L 55,35 L 110,0" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="55" y="55" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#475569" text-anchor="middle">GROCERIES</text>
    </g>
    
    <!-- Envelope 2 (Dining Out) -->
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="110" height="70" rx="4" fill="#38bdf8" opacity="0.9" stroke="#0ea5e9" stroke-width="1.5" />
      <path d="M 0,0 L 55,35 L 110,0" fill="none" stroke="#0284c7" opacity="0.5" stroke-width="1.5" />
      <!-- Cash peaking out of this middle envelope -->
      <rect x="20" y="-15" width="70" height="25" rx="2" fill="#10b981" stroke="#059669" stroke-width="1" />
      <line x1="30" y1="-5" x2="80" y2="-5" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
      <text x="55" y="55" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#ffffff" text-anchor="middle">DINING OUT</text>
    </g>

    <!-- Envelope 3 (Gas/Transit) -->
    <g transform="translate(300, 20)">
      <rect x="0" y="0" width="110" height="70" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" />
      <path d="M 0,0 L 55,35 L 110,0" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="55" y="55" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#475569" text-anchor="middle">GAS &amp; FUEL</text>
    </g>
  </g>
</svg>
