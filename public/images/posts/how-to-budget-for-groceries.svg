<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for gradients, shadows, and clip paths -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Decorative Background Grid & Light Flares -->
  <g opacity="0.03">
    <path d="M 0,50 L 800,50 M 0,150 L 800,150 M 0,250 L 800,250 M 0,350 L 800,350" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 300,0 L 300,450 M 500,0 L 500,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>
  <circle cx="150" cy="300" r="250" fill="#10b981" opacity="0.03" filter="blur(40px)" />
  <circle cx="650" cy="150" r="200" fill="#3b82f6" opacity="0.02" filter="blur(40px)" />

  <!-- LEFT ELEMENT: The "Smart" Shopping Cart -->
  <g transform="translate(140, 80)" filter="url(#shadow)">
    <!-- Grocery Cart Base Frame -->
    <path d="M 20 40 L 40 180 L 170 180 L 190 60 L 10 60" fill="none" stroke="#64748b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Grid pattern inside the cart -->
    <path d="M 40 90 L 183 90 M 40 120 L 178 120 M 40 150 L 173 150 M 70 60 L 70 180 M 110 60 L 110 180 M 150 60 L 150 180" fill="none" stroke="#475569" stroke-width="3" />
    <!-- Cart Handle & Wheel Legs -->
    <path d="M 20 40 L 0 30" fill="none" stroke="#64748b" stroke-width="6" stroke-linecap="round" />
    <path d="M 50 180 L 40 220 M 160 180 L 170 220" fill="none" stroke="#64748b" stroke-width="6" stroke-linecap="round" />
    <!-- Wheels -->
    <circle cx="40" cy="225" r="14" fill="#334155" stroke="#64748b" stroke-width="3" />
    <circle cx="40" cy="225" r="5" fill="#0f172a" />
    <circle cx="170" cy="225" r="14" fill="#334155" stroke="#64748b" stroke-width="3" />
    <circle cx="170" cy="225" r="5" fill="#0f172a" />

    <!-- Healthy Produce inside Cart -->
    <!-- Leafy Greens -->
    <path d="M 55 70 Q 40 30 75 40 Q 110 30 95 70 Z" fill="#10b981" opacity="0.9" />
    <path d="M 65 70 Q 55 40 85 45 Q 115 45 105 70 Z" fill="#059669" opacity="0.8" />
    <!-- Crisp Red Apple -->
    <circle cx="125" cy="55" r="20" fill="url(#appleGrad)" />
    <path d="M 125 35 Q 130 25 122 22" fill="none" stroke="#a16207" stroke-width="3" stroke-linecap="round" />
    <path d="M 125 25 Q 135 22 135 28 Z" fill="#10b981" />
    <!-- Orange -->
    <circle cx="160" cy="62" r="18" fill="#f97316" />
    <circle cx="155" cy="55" r="1.5" fill="#ea580c" />
    <circle cx="165" cy="65" r="1.5" fill="#ea580c" />
  </g>

  <!-- RIGHT ELEMENT: The Grocery Receipt Calculator -->
  <g transform="translate(430, 60)" filter="url(#shadow)">
    <!-- Receipt Background -->
    <path d="M 10 0 L 220 0 L 220 280 L 210 270 L 200 280 L 190 270 L 180 280 L 170 270 L 160 280 L 150 270 L 140 280 L 130 270 L 120 280 L 110 270 L 100 280 L 90 270 L 80 280 L 70 270 L 60 280 L 50 270 L 40 280 L 30 270 L 20 280 L 10 270 Z" fill="#ffffff" />
    
    <!-- Receipt Header -->
    <text x="115" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#0f172a" text-anchor="middle" letter-spacing="1.5">MARKET RECEIPT</text>
    <line x1="30" y1="52" x2="200" y2="52" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4" />

    <!-- Receipt Line Items -->
    <g font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">
      <!-- Item 1 -->
      <text x="30" y="80">Fresh Greens</text>
      <text x="200" y="80" text-anchor="end">$4.20</text>
      <!-- Item 2 -->
      <text x="30" y="105">Organic Apples (1lb)</text>
      <text x="200" y="105" text-anchor="end">$3.50</text>
      <!-- Item 3 -->
      <text x="30" y="130">Whole Wheat Bread</text>
      <text x="200" y="130" text-anchor="end">$2.80</text>
      <!-- Item 4 -->
      <text x="30" y="155">Oat Milk (Half Gal)</text>
      <text x="200" y="155" text-anchor="end">$3.90</text>
    </g>

    <!-- Total Section -->
    <line x1="30" y1="180" x2="200" y2="180" stroke="#0f172a" stroke-width="1.5" />
    
    <text x="30" y="210" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#0f172a">WEEKLY TOTAL</text>
    <text x="200" y="210" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#10b981" text-anchor="end">$14.40</text>
    
    <text x="30" y="232" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">WEEKLY BUDGET: $150.00</text>

    <!-- Success Stamp -->
    <g transform="translate(115, 230) rotate(-8)">
      <rect x="-45" y="-12" width="90" height="22" rx="4" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="1" />
      <text x="0" y="4" font-family="system-ui, sans-serif" font-size="10" font-weight="900" fill="#10b981" text-anchor="middle" letter-spacing="1">UNDER BUDGET</text>
    </g>
  </g>

  <!-- Interactive Budget Indicator (Floating Calculator Widget) -->
  <g transform="translate(350, 160)" filter="url(#shadow)">
    <rect width="90" height="90" rx="16" fill="url(#cardGrad)" stroke="#334155" stroke-width="2" />
    <circle cx="45" cy="45" r="28" fill="#10b981" opacity="0.15" />
    <!-- Calculator/Math Icon -->
    <path d="M 37 37 L 53 53 M 53 37 L 37 53" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
    <rect x="35" y="32" width="20" height="4" rx="1" fill="#10b981" transform="rotate(45, 45, 45)" />
    <!-- Small plus indicator -->
    <path d="M 70 24 L 70 32 M 66 28 L 74 28" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Title and Subtitle at the Bottom -->
  <text x="400" y="390" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Smart Grocery Budgeting</text>
  <text x="400" y="415" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Stop guessing at the register. Master your weekly food spend.</text>
</svg>
