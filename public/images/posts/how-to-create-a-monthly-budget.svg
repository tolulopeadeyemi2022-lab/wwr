<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" opacity="0.4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Main Interface Dashboard Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Titles Inside UI -->
  <text x="400" y="165" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#ffffff" text-anchor="middle">MONTHLY BUDGET PLANNER</text>
  <text x="400" y="195" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#10b981" text-anchor="middle">Balancing Income vs Expense Realities</text>

  <!-- Simple Data Flow Blocks -->
  <g transform="translate(200, 230)">
    <!-- Income Node -->
    <rect x="0" y="20" width="80" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="40" y="45" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#10b981" text-anchor="middle">INCOME</text>
    
    <!-- Connector Arrow Lines -->
    <path d="M 85,40 L 135,40" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4" />
    
    <!-- Central System Bucket -->
    <rect x="140" y="10" width="120" height="60" rx="8" fill="url(#barGrad)" stroke="#38bdf8" stroke-width="1" />
    <text x="200" y="45" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">50 / 30 / 20</text>
    
    <!-- Connector Arrow Lines -->
    <path d="M 265,40 L 315,40" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4" />

    <!-- Allocation Node -->
    <rect x="320" y="20" width="80" height="40" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="360" y="45" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#38bdf8" text-anchor="middle">SAVINGS</text>
  </g>
</svg>
