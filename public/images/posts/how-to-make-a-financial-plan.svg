<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Decorative Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Main Interface Dashboard Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Main Titles Inside UI -->
  <text x="400" y="165" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#ffffff" text-anchor="middle">MAKE A FINANCIAL PLAN FOR YOUR FUTURE</text>
  <text x="400" y="195" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#0ea5e9" text-anchor="middle">5 Steps To Build Your Strategic Money Map</text>

  <!-- Financial Roadmap / Strategic Map Asset -->
  <g transform="translate(240, 240)">
    <!-- Roadmap Pathway Connecting Nodes -->
    <path d="M 40,40 Q 120,10 160,40 T 280,20" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-dasharray="4 4" opacity="0.8" />
    
    <!-- Milestone Node 1 -->
    <circle cx="40" cy="40" r="10" fill="#10b981" />
    <text x="40" y="65" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#94a3b8" text-anchor="middle">START</text>

    <!-- Milestone Node 2 -->
    <circle cx="160" cy="40" r="12" fill="#0ea5e9" />
    <polygon points="156,44 166,34 164,32 156,40 152,36 150,38" fill="#ffffff" />
    <text x="160" y="65" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#94a3b8" text-anchor="middle">STRATEGY</text>

    <!-- Milestone Node 3 -->
    <circle cx="280" cy="20" r="10" fill="#f59e0b" />
    <text x="280" y="45" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#f59e0b" text-anchor="middle">GOAL</text>
  </g>
</svg>
