<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Decorative Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Debt Meltdown Visual Graphic (Breaking chain/decreasing bars) -->
  <g opacity="0.25" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M 150,120 L 250,180 L 400,280 L 650,320" />
  </g>

  <!-- Main Interface Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Main Title Text Inside UI -->
  <text x="400" y="170" font-family="system-ui, sans-serif" font-weight="800" font-size="28" fill="#ffffff" text-anchor="middle">HOW TO PAY OFF DEBT FAST</text>
  <text x="400" y="205" font-family="system-ui, sans-serif" font-weight="600" font-size="18" fill="#ef4444" text-anchor="middle">A Realistic Plan That Works</text>

  <!-- Debt Snowball / Avalanche Visualization Bars -->
  <g transform="translate(200, 250)">
    <!-- Debt Bar 1 -->
    <text x="0" y="15" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">Card A</text>
    <rect x="60" y="4" width="260" height="14" rx="4" fill="#ef4444" opacity="0.8"/>
    <path d="M 330,11 L 345,11" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Debt Bar 2 -->
    <text x="0" y="40" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">Card B</text>
    <rect x="60" y="29" width="180" height="14" rx="4" fill="#f59e0b" opacity="0.8"/>
    <path d="M 250,36 L 270,36" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>

    <!-- Debt Bar 3 (Paid Off!) -->
    <text x="0" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Loan C</text>
    <rect x="60" y="54" width="40" height="14" rx="4" fill="#10b981"/>
    <text x="110" y="66" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#10b981">PAID</text>
  </g>
</svg>
