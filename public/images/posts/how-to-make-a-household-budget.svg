<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for gradients and layout shadows -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="pieBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="pieGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="pieYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="layerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Ambient Light Overlays -->
  <circle cx="400" cy="200" r="260" fill="#3b82f6" opacity="0.03" filter="blur(40px)" />
  <circle cx="200" cy="150" r="180" fill="#10b981" opacity="0.02" filter="blur(30px)" />

  <!-- MAIN GRAPHIC: Interactive 50/30/20 Family Hub Workspace -->
  <g transform="translate(240, 50)" filter="url(#layerShadow)">
    <!-- Main Dashboard Card Background -->
    <rect width="320" height="290" rx="24" fill="#1e293b" stroke="#334155" stroke-width="2" />
    
    <!-- Top Mock App Chrome/Bar -->
    <circle cx="25" cy="22" r="5" fill="#ef4444" />
    <circle cx="40" cy="22" r="5" fill="#f59e0b" />
    <circle cx="55" cy="22" r="5" fill="#10b981" />
    <text x="160" y="26" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="0.5">FAMILY BUDGET HUBSPOT</text>
    <line x1="20" y1="42" x2="300" y2="42" stroke="#334155" stroke-width="1.5" />

    <!-- Central Donut Chart Concept representing Unified Household Income Allocation -->
    <g transform="translate(160, 140)">
      <!-- Base Background Circle -->
      <circle r="70" fill="none" stroke="#334155" stroke-width="24" />
      
      <!-- 50% Needs Sector (Blue) -->
      <path d="M 0,-70 A 70,70 0 0,1 0,70" fill="none" stroke="url(#pieBlue)" stroke-width="24" stroke-linecap="round" />
      
      <!-- 30% Wants Sector (Green) -->
      <path d="M 0,70 A 70,70 0 0,1 -66.5,-21.6" fill="none" stroke="url(#pieGreen)" stroke-width="24" stroke-linecap="round" />
      
      <!-- 20% Savings Sector (Yellow) -->
      <path d="M -66.5,-21.6 A 70,70 0 0,1 -0.1,-70" fill="none" stroke="url(#pieYellow)" stroke-width="24" stroke-linecap="round" />

      <!-- Center Hole Text Label -->
      <circle r="46" fill="#1e293b" />
      <text x="0" y="-4" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle">$5,400</text>
      <text x="0" y="14" font-family="system-ui, sans-serif" font-size="9" font-weight="800" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">TOTAL POOL</text>
    </g>

    <!-- Collaborative User Avatar Assignees (Indicating Team Ownership) -->
    <!-- Partner 1 (Needs manager) -->
    <g transform="translate(265, 95)">
      <circle r="16" fill="#3b82f6" stroke="#1e293b" stroke-width="2" />
      <text x="0" y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle">P1</text>
      <rect x="-24" y="20" width="48" height="14" rx="4" fill="#0f172a" />
      <text x="0" y="30" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#3b82f6" text-anchor="middle">NEEDS</text>
    </g>

    <!-- Partner 2 (Wants manager) -->
    <g transform="translate(245, 195)">
      <circle r="16" fill="#10b981" stroke="#1e293b" stroke-width="2" />
      <text x="0" y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle">P2</text>
      <rect x="-24" y="20" width="48" height="14" rx="4" fill="#0f172a" />
      <text x="0" y="30" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#10b981" text-anchor="middle">WANTS</text>
    </g>

    <!-- Teenager/Child (Savings tracker assigned item) -->
    <g transform="translate(45, 150)">
      <circle r="16" fill="#fbbf24" stroke="#1e293b" stroke-width="2" />
      <text x="0" y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#0f172a" text-anchor="middle">KID</text>
      <rect x="-26" y="20" width="52" height="14" rx="4" fill="#0f172a" />
      <text x="0" y="30" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#fbbf24" text-anchor="middle">SAVINGS</text>
    </g>

    <!-- Low-pressure 15-Min Meeting Warning Badge at Bottom -->
    <g transform="translate(160, 255)">
      <rect x="-85" y="-12" width="170" height="24" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <circle cx="-68" cy="0" r="4" fill="#10b981" />
      <text x="-56" y="4" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">Bi-Weekly Sync:</text>
      <text x="26" y="4" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#10b981">15 Mins Active</text>
    </g>
  </g>

  <!-- Left Side Floating Icon Element: Meeting Calendar Sync -->
  <g transform="translate(100, 160)" filter="url(#layerShadow)">
    <rect width="65" height="65" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5" />
    <rect x="0" y="0" width="65" height="18" rx="14" fill="#ef4444" clip-path="inset(0 0 10 0)" />
    <!-- Clock hands interior icon -->
    <circle cx="32.5" cy="40" r="14" fill="none" stroke="#94a3b8" stroke-width="2" />
    <path d="M 32.5 31 L 32.5 40 L 40 40" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Right Side Floating Icon Element: Shared Security Checklist -->
  <g transform="translate(620, 140)" filter="url(#layerShadow)">
    <rect width="70" height="85" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5" />
    <path d="M 20 25 L 30 35 L 50 15" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="15" y1="50" x2="55" y2="50" stroke="#475569" stroke-width="2" stroke-linecap="round" />
    <line x1="15" y1="62" x2="40" y2="62" stroke="#475569" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Bottom Typography Header Context -->
  <text x="400" y="385" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Collaborative Household Budgets</text>
  <text x="400" y="410" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Stop building frameworks alone. Give every family member a seat at the table.</text>
</svg>
