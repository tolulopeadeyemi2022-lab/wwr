<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for complex assets -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Abstract Tech Grid Lines -->
  <g opacity="0.02" stroke="#ffffff" stroke-width="1">
    <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 0,400 L 800,400" />
    <path d="M 150,0 L 150,450 M 300,0 L 300,450 M 450,0 L 450,450 M 600,0 L 600,450" />
  </g>
  <circle cx="250" cy="200" r="280" fill="#3b82f6" opacity="0.04" filter="blur(50px)" />
  <circle cx="550" cy="250" r="220" fill="#10b981" opacity="0.03" filter="blur(40px)" />

  <!-- LEFT GRAPHIC: The Household Budget Matrix -->
  <g transform="translate(130, 70)" filter="url(#cardShadow)">
    <!-- Base Masonry Matrix Card -->
    <rect width="240" height="260" rx="20" fill="#1e293b" stroke="#334155" stroke-width="2" />
    
    <!-- Header Interface -->
    <text x="24" y="36" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#94a3b8" letter-spacing="1">HOUSEHOLD ALLOCATION</text>
    
    <!-- Envelope Allocation Bars -->
    <!-- Bar 1: Housing -->
    <text x="24" y="70" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Mortgage &amp; Bills</text>
    <text x="216" y="70" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#3b82f6" text-anchor="end">45%</text>
    <rect x="24" y="78" width="192" height="8" rx="4" fill="#334155" />
    <rect x="24" y="78" width="86" height="8" rx="4" fill="#3b82f6" />

    <!-- Bar 2: Groceries -->
    <text x="24" y="115" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Grocery Envelope</text>
    <text x="216" y="115" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#10b981" text-anchor="end">25%</text>
    <rect x="24" y="123" width="192" height="8" rx="4" fill="#334155" />
    <rect x="24" y="123" width="48" height="8" rx="4" fill="#10b981" />

    <!-- Bar 3: Automated Savings -->
    <text x="24" y="160" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Auto-Savings</text>
    <text x="216" y="160" font-family="system-ui, sans-serif" font-weight="700" font-size="11" fill="#fbbf24" text-anchor="end">20%</text>
    <rect x="24" y="168" width="192" height="8" rx="4" fill="#334155" />
    <rect x="24" y="168" width="38" height="8" rx="4" fill="#fbbf24" />

    <!-- Mini Analytics Overlay inside Matrix -->
    <rect x="24" y="196" width="192" height="44" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1" />
    <circle cx="44" cy="218" r="10" fill="#10b981" opacity="0.2" />
    <path d="M 40 218 L 43 221 L 49 215" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="64" y="216" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Goal Status</text>
    <text x="64" y="229" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b">On Track (+ $150.00)</text>
  </g>

  <!-- RIGHT GRAPHIC: The Financial Sanctuary (Protected Family Home) -->
  <g transform="translate(440, 75)" filter="url(#cardShadow)">
    <!-- Base Pillar/Platform -->
    <path d="M 20 220 L 220 220 L 200 240 L 40 240 Z" fill="#334155" />
    
    <!-- Main House Structure -->
    <rect x="50" y="110" width="140" height="110" fill="url(#houseGrad)" rx="4" />
    <!-- Triangular Roof Line -->
    <path d="M 30 115 L 120 30 L 210 115 Z" fill="#1e40af" />
    <path d="M 30 115 L 120 30 L 120 115 Z" fill="#1d4ed8" opacity="0.3" /> <!-- Shading -->

    <!-- Glowing Windows of Stability -->
    <rect x="75" y="135" width="26" height="32" rx="4" fill="#ffffff" />
    <line x1="88" y1="135" x2="88" y2="167" stroke="#cbd5e1" stroke-width="1" />
    <line x1="75" y1="151" x2="101" y2="151" stroke="#cbd5e1" stroke-width="1" />

    <rect x="139" y="135" width="26" height="32" rx="4" fill="#ffffff" />
    <line x1="152" y1="135" x2="152" y2="167" stroke="#cbd5e1" stroke-width="1" />
    <line x1="139" y1="151" x2="165" y2="151" stroke="#cbd5e1" stroke-width="1" />

    <!-- Protected Family Door -->
    <rect x="105" y="180" width="30" height="40" fill="#0f172a" rx="2" />
    <circle cx="112" cy="200" r="2" fill="#fbbf24" />

    <!-- Floating Shields/Growth Tokens -->
    <!-- Growth Coin -->
    <circle cx="210" cy="50" r="22" fill="url(#goldGrad)" />
    <text x="210" y="56" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#ffffff" text-anchor="middle">$</text>
    <!-- Small Protection Check -->
    <circle cx="40" cy="60" r="16" fill="#10b981" />
    <path d="M 34 60 L 38 64 L 46 56" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Title & Subtitle Section -->
  <text x="400" y="385" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Practical Family Budgeting</text>
  <text x="400" y="410" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">11 field-tested habits to automate household savings and protect your margin.</text>
</svg>
