<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2a4a"/>
      <stop offset="100%" stop-color="#1c4a75"/>
    </linearGradient>
    <linearGradient id="jarA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f4a63a"/>
    </linearGradient>
    <linearGradient id="jarB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#2fbf85"/>
    </linearGradient>
    <linearGradient id="jarC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- soft decorative circles -->
  <circle cx="1080" cy="90" r="140" fill="#ffffff" opacity="0.04"/>
  <circle cx="90" cy="560" r="180" fill="#ffffff" opacity="0.04"/>

  <!-- subtle grid dots -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="60" cy="60" r="3"/>
    <circle cx="120" cy="60" r="3"/>
    <circle cx="180" cy="60" r="3"/>
    <circle cx="60" cy="120" r="3"/>
    <circle cx="120" cy="120" r="3"/>
    <circle cx="180" cy="120" r="3"/>
  </g>

  <!-- signpost -->
  <rect x="592" y="230" width="16" height="330" rx="4" fill="#e8eef5" opacity="0.9"/>

  <!-- three sign arms pointing to jars -->
  <g>
    <rect x="430" y="250" width="170" height="46" rx="8" fill="#f7f9fc"/>
    <text x="515" y="279" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#1c4a75" text-anchor="middle" font-weight="700">401(k)</text>
  </g>
  <g>
    <rect x="600" y="310" width="190" height="46" rx="8" fill="#f7f9fc"/>
    <text x="695" y="339" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#1c4a75" text-anchor="middle" font-weight="700">Roth IRA</text>
  </g>
  <g>
    <rect x="430" y="370" width="170" height="46" rx="8" fill="#f7f9fc"/>
    <text x="515" y="399" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1c4a75" text-anchor="middle" font-weight="700">Brokerage</text>
  </g>

  <!-- three account jars along the bottom -->
  <!-- Jar A -->
  <g transform="translate(150,380)">
    <rect x="0" y="40" width="120" height="150" rx="16" fill="url(#jarA)"/>
    <rect x="-8" y="20" width="136" height="26" rx="10" fill="#f4a63a"/>
    <rect x="20" y="0" width="80" height="20" rx="8" fill="#e8912a"/>
    <text x="60" y="130" font-family="Arial, sans-serif" font-size="34" fill="#7a4a00" text-anchor="middle" font-weight="700">$</text>
  </g>

  <!-- Jar B -->
  <g transform="translate(540,410)">
    <rect x="0" y="40" width="120" height="150" rx="16" fill="url(#jarB)"/>
    <rect x="-8" y="20" width="136" height="26" rx="10" fill="#2fbf85"/>
    <rect x="20" y="0" width="80" height="20" rx="8" fill="#22a874"/>
    <text x="60" y="130" font-family="Arial, sans-serif" font-size="34" fill="#0a3d2b" text-anchor="middle" font-weight="700">$</text>
  </g>

  <!-- Jar C -->
  <g transform="translate(930,380)">
    <rect x="0" y="40" width="120" height="150" rx="16" fill="url(#jarC)"/>
    <rect x="-8" y="20" width="136" height="26" rx="10" fill="#3b82f6"/>
    <rect x="20" y="0" width="80" height="20" rx="8" fill="#2563eb"/>
    <text x="60" y="130" font-family="Arial, sans-serif" font-size="34" fill="#0b2a63" text-anchor="middle" font-weight="700">$</text>
  </g>

  <!-- magnifying glass over the signpost, symbolizing "choosing" -->
  <g transform="translate(600,150)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="#ffd166" stroke-width="10"/>
    <line x1="33" y1="33" x2="66" y2="66" stroke="#ffd166" stroke-width="12" stroke-linecap="round"/>
    <path d="M -18 0 L -6 12 L 20 -16" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title text -->
  <text x="600" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#ffffff" text-anchor="middle" font-weight="700">Choosing the Right Investment Account</text>
</svg>
