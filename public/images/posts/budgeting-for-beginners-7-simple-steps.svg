<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Decorative Grid Lines Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Abstract Growth Graphic (Background Layer) -->
  <path d="M 100,380 Q 250,320 400,220 T 700,100" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" opacity="0.4" />
  <path d="M 100,380 Q 250,320 400,220 T 700,100 L 700,450 L 100,450 Z" fill="url(#accentGrad)" opacity="0.05" />

  <!-- Main Interface / Dashboard Mockup Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Central Title Text Visualized Inside UI -->
  <text x="400" y="170" font-family="system-ui, sans-serif" font-weight="800" font-size="28" fill="#ffffff" text-anchor="middle">BUDGETING FOR BEGINNERS</text>
  <text x="400" y="205" font-family="system-ui, sans-serif" font-weight="600" font-size="18" fill="#10b981" text-anchor="middle">7 Simple Steps to Take Control</text>

  <!-- 7 Steps Visual Benchmarks/Nodes -->
  <g transform="translate(160, 270)">
    <!-- Progress Bar Base -->
    <rect x="0" y="10" width="480" height="8" rx="4" fill="#334155" />
    <!-- Active Progress -->
    <rect x="0" y="10" width="320" height="8" rx="4" fill="url(#accentGrad)" />
    
    <!-- Step Nodes -->
    <circle cx="0" cy="14" r="10" fill="#10b981" />
    <circle cx="80" cy="14" r="10" fill="#10b981" />
    <circle cx="160" cy="14" r="10" fill="#10b981" />
    <circle cx="240" cy="14" r="10" fill="#10b981" />
    <circle cx="320" cy="14" r="10" fill="#3b82f6" />
    <circle cx="400" cy="14" r="7" fill="#475569" />
    <circle cx="480" cy="14" r="7" fill="#475569" />
    
    <!-- Step Numbers -->
    <text x="0" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="80" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="160" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="240" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="320" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
    <text x="400" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">6</text>
    <text x="480" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">7</text>
  </g>

  <!-- Minimalist Accent Icons Graphic -->
  <!-- Arrow path rising -->
  <path d="M 610,230 L 630,210 L 630,225" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 585,250 Q 600,250 630,210" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />
</svg>
