<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Decorative Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Main Interface Dashboard Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Main Titles Inside UI -->
  <text x="400" y="165" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#ffffff" text-anchor="middle">BUILD AN EMERGENCY FUND FROM SCRATCH</text>
  <text x="400" y="195" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#10b981" text-anchor="middle">Step-By-Step Financial Shield Guide</text>

  <!-- Progress Shield Asset Representation -->
  <g transform="translate(365,  230)">
    <!-- Shield Outline Vector Contour -->
    <path d="M 0,0 C 40,-10 40,-10 40,-10 C 40,30 30,65  0,85 C -30,65 -40,30 -40,-10 C -40,-10 -40,-10 0,0 Z" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linejoin="round"/>
    <!-- Shield Fill Glow -->
    <path d="M 0,5 C 32,-4 32,-4 32,-4 C 32,30 24,58  0,74 C -24,58 -32,30 -32,-4 C -32,-4 -32,-4 0,5 Z" fill="url(#accentGrad)" opacity="0.15" />
    <!-- Checkmark Inside Shield -->
    <path d="M -12,35 L -3,44 L 14,24" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Step Progress Dots Left and Right -->
  <circle cx="280" cy="270" r="6" fill="#10b981" />
  <circle cx="310" cy="270" r="6" fill="#10b981" />
  <circle cx="490" cy="270" r="6" fill="#334155" />
  <circle cx="520" cy="270" r="6" fill="#334155" />
</svg>
