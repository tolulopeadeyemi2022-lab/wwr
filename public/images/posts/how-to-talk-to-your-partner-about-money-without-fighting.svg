<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Decorative Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Main Interface Dashboard Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Main Titles Inside UI -->
  <text x="400" y="165" font-family="system-ui, sans-serif" font-weight="800" font-size="24" fill="#ffffff" text-anchor="middle">TALK TO YOUR PARTNER ABOUT MONEY</text>
  <text x="400" y="195" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#6366f1" text-anchor="middle">Healthy Communication &amp; Shared Financial Goals</text>

  <!-- Two Overlapping Conversation Bubbles Representing Teamwork -->
  <g transform="translate(340, 235)">
    <!-- Left Chat Bubble -->
    <path d="M 10,10 H 70 A 8,8 0 0 1 78,18 V 45 A 8,8 0 0 1 70,53 H 25 L 12,65 V 53 A 8,8 0 0 1 10,45 Z" fill="#6366f1" opacity="0.8"/>
    <!-- Right Chat Bubble -->
    <path d="M 110,10 H 50 A 8,8 0 0 0 42,18 V 45 A 8,8 0 0 0 50,53 H 95 L 108,65 V 53 A 8,8 0 0 0 110,45 Z" fill="#10b981" opacity="0.8"/>
    <!-- Small Heart Accent to symbolize alignment -->
    <path d="M 60,25 C 60,20 54,16 50,20 C 46,16 40,20 40,25 C 40,32 50,38 50,38 C 50,38 60,32 60,25 Z" fill="#ffffff"/>
  </g>
</svg>
