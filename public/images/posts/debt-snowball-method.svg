<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Decorative Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <!-- Growing Snowball Vector Path -->
  <path d="M 100,360 Q 300,340 500,240 T 700,100" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.2" />

  <!-- Main Interface Dashboard Card -->
  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <!-- Main Titles Inside UI -->
  <text x="400" y="165" font-family="system-ui, sans-serif" font-weight="800" font-size="28" fill="#ffffff" text-anchor="middle">THE DEBT SNOWBALL METHOD</text>
  <text x="400" y="195" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#ef4444" text-anchor="middle">How To Pay Off Debt &amp; Stay Motivated</text>

  <!-- Snowball Effect Visual representation (Smallest to Largest) -->
  <g transform="translate(230, 240)">
    <!-- Debt 1 (Smallest Balance, Paid) -->
    <circle cx="30" cy="40" r="14" fill="#10b981" opacity="0.8" />
    <text x="30" y="44" font-family="system-ui, sans-serif" font-size="11" font-weight="900" fill="#ffffff" text-anchor="middle">$$</text>
    <line x1="12" y1="22" x2="48" y2="58" stroke="#ffffff" stroke-width="2" />
    <text x="30" y="70" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">PAID</text>

    <!-- Debt 2 (Current Target) -->
    <circle cx="140" cy="35" r="22" fill="#ef4444" opacity="0.9" />
    <text x="140" y="40" font-family="system-ui, sans-serif" font-size="13" font-weight="900" fill="#ffffff" text-anchor="middle">$$$</text>
    <text x="140" y="70" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">ATTACK</text>

    <!-- Debt 3 (Large Balance) -->
    <circle cx="280" cy="25" r="32" fill="#334155" stroke="#475569" stroke-width="2" />
    <text x="280" y="30" font-family="system-ui, sans-serif" font-size="15" font-weight="900" fill="#64748b" text-anchor="middle">$$$$</text>
    <text x="280" y="70" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">MINIMUM</text>
  </g>
</svg>
