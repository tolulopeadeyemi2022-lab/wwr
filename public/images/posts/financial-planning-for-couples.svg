  <circle cx="165" cy="105" r="5" fill="#ef4444" />
  <circle cx="180" cy="105" r="5" fill="#f59e0b" />
  <circle cx="195" cy="105" r="5" fill="#10b981" />
  <rect x="220" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

