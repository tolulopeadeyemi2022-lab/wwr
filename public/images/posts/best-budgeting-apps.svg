<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="chartGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="chartGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Decorative Background Elements -->
  <circle cx="200" cy="150" r="180" fill="#3b82f6" opacity="0.02" />
  <circle cx="600" cy="300" r="220" fill="#10b981" opacity="0.02" />

  <!-- Main Grid Layout / Dashboard UI Elements Behind Phone -->
  <g transform="translate(80, 50)" opacity="0.15">
    <rect x="0" y="40" width="160" height="100" rx="8" fill="#ffffff" />
    <rect x="180" y="40" width="160" height="100" rx="8" fill="#ffffff" />
    <rect x="0" y="160" width="340" height="120" rx="8" fill="#ffffff" />
  </g>

  <!-- Central Composition: Budgeting Smartphone UI -->
  <g transform="translate(285, 45)" filter="url(#shadow)">
    <!-- Phone Frame -->
    <rect width="230" height="340" rx="28" fill="url(#phoneGrad)" stroke="#334155" stroke-width="3" />
    <!-- Screen Glass Area -->
    <rect x="8" y="8" width="214" height="324" rx="22" fill="#0f172a" />
    
    <!-- Phone Speaker/Camera Notch -->
    <rect x="75" y="14" width="80" height="5" rx="2.5" fill="#1e293b" />
    <circle cx="65" cy="16" r="3" fill="#1e293b" />

    <!-- App Dashboard Title -->
    <text x="24" y="46" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#94a3b8" letter-spacing="0.5">FINANCES</text>
    <circle cx="195" cy="42" r="10" fill="#1e293b" />
    <circle cx="195" cy="42" r="4" fill="#38bdf8" />

    <!-- Wallet Balance Widget -->
    <g transform="translate(20, 65)">
      <rect width="190" height="70" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text x="16" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b">TOTAL BUDGET MARGIN</text>
      <text x="16" y="52" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#ffffff">$4,200.00</text>
    </g>

    <!-- Spending Progress Bars (Budget Categories) -->
    <!-- Category 1: Housing/Rent -->
    <g transform="translate(20, 150)">
      <text x="0" y="12" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#94a3b8">Housing &amp; Bills</text>
      <text x="190" y="12" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#10b981" text-anchor="end">57%</text>
      <rect y="20" width="190" height="8" rx="4" fill="#1e293b" />
      <rect y="20" width="108" height="8" rx="4" fill="url(#chartGrad1)" />
    </g>

    <!-- Category 2: Food & Groceries -->
    <g transform="translate(20, 195)">
      <text x="0" y="12" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#94a3b8">Groceries</text>
      <text x="190" y="12" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#3b82f6" text-anchor="end">32%</text>
      <rect y="20" width="190" height="8" rx="4" fill="#1e293b" />
      <rect y="20" width="61" height="8" rx="4" fill="url(#chartGrad2)" />
    </g>

    <!-- Category 3: Subscriptions / Fun Money -->
    <g transform="translate(20, 240)">
      <text x="0" y="12" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#94a3b8">Subscriptions</text>
      <text x="190" y="12" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="end">84%</text>
      <rect y="20" width="190" height="8" rx="4" fill="#1e293b" />
      <rect y="20" width="160" height="8" rx="4" fill="#f59e0b" />
    </g>

    <!-- Minimalistic Bottom Navigation Bar -->
    <g transform="translate(20, 298)">
      <line x1="0" y1="0" x2="190" y2="0" stroke="#1e293b" stroke-width="1" />
      <circle cx="30" cy="14" r="5" fill="#38bdf8" />
      <circle cx="80" cy="14" r="5" fill="#64748b" />
      <circle cx="130" cy="14" r="5" fill="#64748b" />
      <circle cx="180" cy="14" r="5" fill="#64748b" />
    </g>
  </g>

  <!-- Decorative Minimalist Floating App Icons Outside Phone -->
  <g transform="translate(540, 120)" filter="url(#shadow)">
    <circle cx="20" cy="20" r="24" fill="#0f172a" stroke="#10b981" stroke-width="1" />
    <text x="20" y="27" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#10b981" text-anchor="middle">$</text>
  </g>
  <g transform="translate(210, 260)" filter="url(#shadow)">
    <circle cx="20" cy="20" r="20" fill="#0f172a" stroke="#3b82f6" stroke-width="1" />
    <path d="M 14 24 L 20 14 L 26 24 Z" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round" />
  </g>

  <!-- Typography Heading Footers -->
  <text x="400" y="405" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Top Rated Budgeting Apps</text>
  <text x="400" y="428" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Find the perfect automated platform for your money management profile</text>
</svg>
