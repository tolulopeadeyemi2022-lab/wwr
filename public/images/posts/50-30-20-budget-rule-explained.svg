<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" />
  </g>

  <rect x="120" y="80" width="560" height="290" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2" />
  
  <circle cx="145" cy="105" r="5" fill="#ef4444" />
  <circle cx="160" cy="105" r="5" fill="#f59e0b" />
  <circle cx="175" cy="105" r="5" fill="#10b981" />
  <rect x="200" y="97" width="120" height="16" rx="4" fill="#334155" opacity="0.5" />

  <text x="400" y="165" font-family="system-ui, sans-serif" font-weight="800" font-size="26" fill="#ffffff" text-anchor="middle">THE 50/30/20 BUDGET RULE</text>
  <text x="400" y="195" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#10b981" text-anchor="middle">Simple, Flexible Money Management</text>

  <g transform="translate(150, 240)">
    <rect x="0" y="0" width="150" height="70" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5" />
    <text x="75" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#10b981" text-anchor="middle">50%</text>
    <text x="75" y="52" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">NEEDS</text>

    <rect x="175" y="0" width="150" height="70" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5" />
    <text x="250" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#3b82f6" text-anchor="middle">30%</text>
    <text x="250" y="52" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">WANTS</text>

    <rect x="350" y="0" width="150" height="70" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5" />
    <text x="425" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#f59e0b" text-anchor="middle">20%</text>
    <text x="425" y="52" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">SAVINGS &amp; DEBT</text>
  </g>
</svg>
