<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="envGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fed7aa" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Decorative Background Shapes -->
  <circle cx="100" cy="100" r="180" fill="#34d399" opacity="0.02" />
  <circle cx="700" cy="350" r="150" fill="#fb923c" opacity="0.02" />

  <!-- Main Composition Group -->
  <g transform="translate(40, 10)">
    
    <!-- Cash Stack Slides Out (Back Layer) -->
    <g transform="translate(260, 100) rotate(-8)" filter="url(#shadow)">
      <!-- Cash Bill 3 -->
      <rect x="15" y="-15" width="220" height="110" rx="8" fill="#047857" opacity="0.6" />
      <!-- Cash Bill 2 -->
      <rect x="8" y="-8" width="220" height="110" rx="8" fill="#059669" opacity="0.8" />
      <!-- Cash Bill 1 -->
      <rect x="0" y="0" width="220" height="110" rx="8" fill="url(#cashGrad)" stroke="#6ee7b7" stroke-width="1.5" />
      <!-- Bill Design Border -->
      <rect x="8" y="8" width="204" height="94" rx="4" fill="none" stroke="#a7f3d0" stroke-width="1" stroke-dasharray="4 2" opacity="0.6" />
      <!-- Bill Center Emblem -->
      <circle cx="110" cy="55" r="24" fill="#10b981" opacity="0.3" />
      <text x="110" y="62" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#a7f3d0" text-anchor="middle">$</text>
    </g>

    <!-- Main Budget Envelope (Front Layer) -->
    <g transform="translate(220, 140)" filter="url(#shadow)">
      <!-- Envelope Body Base -->
      <path d="M 0 40 L 280 40 L 280 180 L 0 180 Z" fill="url(#envGrad)" stroke="#ea580c" stroke-width="1" />
      
      <!-- Envelope Open Flap (Backing Guide) -->
      <path d="M 0 40 L 140 0 L 280 40" fill="#fed7aa" opacity="0.9" />
      
      <!-- Envelope Left & Right Side Folds -->
      <path d="M 0 40 L 110 110 L 0 180" fill="#fba85c" opacity="0.8" />
      <path d="M 280 40 L 170 110 L 280 180" fill="#fba85c" opacity="0.8" />
      
      <!-- Envelope Bottom Fold Over -->
      <path d="M 0 180 L 140 95 L 280 180" fill="#f97316" opacity="0.85" stroke="#ea580c" stroke-width="1" />

      <!-- Label Window / Sticker Badge -->
      <rect x="50" y="75" width="180" height="45" rx="6" fill="#ffffff" filter="url(#shadow)" />
      <text x="140" y="103" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#1e293b" text-anchor="middle" letter-spacing="1.5">GROCERIES</text>
    </g>

    <!-- Small Accent Coins or Sparkles -->
    <circle cx="530" cy="180" r="10" fill="#fbbf24" filter="url(#shadow)" />
    <circle cx="550" cy="210" r="7" fill="#f59e0b" filter="url(#shadow)" />
  </g>

  <!-- Title & Label Typography -->
  <text x="400" y="380" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">The Cash Stuffing System</text>
  <text x="400" y="408" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Taking physical control over variable spending habits</text>
</svg>
