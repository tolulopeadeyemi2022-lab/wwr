<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Exponential Growth Curve -->
  <path d="M 100 350 C 300 350, 400 300, 700 100" stroke="url(#lineGrad)" stroke-width="10" fill="none" stroke-linecap="round" />
  
  <text x="400" y="400" font-family="system-ui, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle">THE COMPOUNDING EFFECT</text>
</svg>
