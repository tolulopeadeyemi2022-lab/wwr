<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGradient)" />

  <!-- Abstract geometric design elements -->
  <circle cx="700" cy="100" r="150" fill="#10b981" opacity="0.03" />
  <circle cx="100" cy="350" r="200" fill="#3b82f6" opacity="0.02" />

  <!-- Main Illustration Group -->
  <g transform="translate(0, -10)">
    <!-- Paycheck Card 1 (Week 1-2) -->
    <rect x="140" y="130" width="220" height="180" rx="16" fill="url(#cardGradient)" stroke="#334155" stroke-width="2" filter="url(#dropShadow)" />
    <rect x="140" y="130" width="220" height="12" rx="6" fill="url(#accentGradient)" opacity="0.8" />
    <text x="170" y="175" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#94a3b8" letter-spacing="1">PAYCHECK A</text>
    <text x="170" y="210" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc">$2,500</text>
    
    <!-- Mini bill items inside Card 1 -->
    <rect x="170" y="235" width="100" height="6" rx="3" fill="#334155" />
    <rect x="170" y="250" width="140" height="6" rx="3" fill="#334155" />
    <circle cx="310" cy="242" r="10" fill="#ef4444" opacity="0.2" />
    <path d="M306 242 l3 3 l5 -5" stroke="#ef4444" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Paycheck Card 2 (Week 3-4) -->
    <rect x="440" y="130" width="220" height="180" rx="16" fill="url(#cardGradient)" stroke="#334155" stroke-width="2" filter="url(#dropShadow)" />
    <rect x="440" y="130" width="220" height="12" rx="6" fill="#3b82f6" opacity="0.8" />
    <text x="470" y="175" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#94a3b8" letter-spacing="1">PAYCHECK B</text>
    <text x="470" y="210" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc">$2,500</text>
    
    <!-- Mini bill items inside Card 2 -->
    <rect x="470" y="235" width="120" height="6" rx="3" fill="#334155" />
    <rect x="470" y="250" width="80" height="6" rx="3" fill="#334155" />
    <circle cx="610" cy="242" r="10" fill="#10b981" opacity="0.2" />
    <path d="M606 242 l3 3 l5 -5" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Connecting Cycle Arrows -->
    <path d="M380 190 Q400 170 420 190" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="4 4" stroke-linecap="round" />
    <polygon points="423,190 415,185 418,193" fill="#475569" />

    <path d="M420 250 Q400 270 380 250" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="4 4" stroke-linecap="round" />
    <polygon points="377,250 385,255 382,247" fill="#475569" />

    <!-- Center Balance Bridge / Calendar Indicator -->
    <g transform="translate(335, 320)" filter="url(#dropShadow)">
      <rect x="0" y="0" width="130" height="35" rx="18" fill="#1e293b" stroke="#10b981" stroke-width="2" />
      <text x="65" y="22" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle" letter-spacing="0.5">14-DAY CYCLE</text>
    </g>
  </g>

  <!-- Typography Text Headline -->
  <text x="400" y="395" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Biweekly Budgeting System</text>
  <text x="400" y="420" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Aligning cash flow smoothly between pay periods</text>
</svg>
