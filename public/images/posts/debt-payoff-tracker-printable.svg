<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)" />

  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <path d="M 0,100 L 800,100 M 0,225 L 800,225 M 0,350 L 800,350" />
  </g>

  <text x="400" y="60" font-family="system-ui, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle">DEBT PAYOFF TRACKER</text>
  
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="600" height="60" rx="12" fill="#334155" />
    <rect x="5" y="5" width="420" height="50" rx="8" fill="url(#progressGrad)" />
    
    <g stroke="#94a3b8" stroke-width="2">
      <line x1="150" y1="0" x2="150" y2="60" />
      <line x1="300" y1="0" x2="300" y2="60" />
      <line x1="450" y1="0" x2="450" y2="60" />
    </g>
    
    <text x="420" y="38" font-family="system-ui, sans-serif" font-size="20" font-weight="900" fill="#ffffff" text-anchor="end" dominant-baseline="middle" style="letter-spacing: 1px;">70% COMPLETE</text>
  </g>

  <g transform="translate(100, 260)">
    <text x="0" y="-10" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#94a3b8">INDIVIDUAL MILESTONES</text>
    <rect x="0" y="0" width="40" height="40" rx="6" fill="#10b981" />
    <rect x="50" y="0" width="40" height="40" rx="6" fill="#10b981" />
    <rect x="100" y="0" width="40" height="40" rx="6" fill="#10b981" />
    <rect x="150" y="0" width="40" height="40" rx="6" fill="#10b981" />
    <rect x="200" y="0" width="40" height="40" rx="6" fill="#10b981" />
    <rect x="250" y="0" width="40" height="40" rx="6" fill="#334155" />
    <rect x="300" y="0" width="40" height="40" rx="6" fill="#334155" />
    <rect x="350" y="0" width="40" height="40" rx="6" fill="#334155" />
    <rect x="400" y="0" width="40" height="40" rx="6" fill="#334155" />
    <rect x="450" y="0" width="40" height="40" rx="6" fill="#334155" />
  </g>

  <text x="400" y="400" font-family="system-ui, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Visualize your progress to stay consistent every single payment.</text>
</svg>
