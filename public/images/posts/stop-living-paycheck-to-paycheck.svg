<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definition Blocks for Assets -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Technical grid elements layout -->
  <g opacity="0.02" stroke="#ffffff" stroke-width="1">
    <path d="M 0,80 L 800,80 M 0,180 L 800,180 M 0,280 L 800,280 M 0,380 L 800,380" />
    <path d="M 200,0 L 200,450 M 400,0 L 400,450 M 600,0 L 600,450" />
  </g>
  <circle cx="200" cy="220" r="240" fill="#ef4444" opacity="0.02" filter="blur(40px)" />
  <circle cx="600" cy="200" r="260" fill="#10b981" opacity="0.03" filter="blur(40px)" />

  <!-- LEFT GRAPHIC: The Restrictive Loop (Cycle of Outflows) -->
  <g transform="translate(140, 110)" filter="url(#shadow)">
    <!-- Ominous Red Broken Loop of Continuous Outflows -->
    <circle cx="60" cy="80" r="75" fill="none" stroke="#ef4444" stroke-width="6" stroke-dasharray="14,10" opacity="0.4" />
    <circle cx="60" cy="80" r="75" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-dasharray="120,180" />
    
    <!-- Micro Paycheck Outflow Icons inside the Loop -->
    <rect x="25" y="35" width="70" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    
    <!-- Depleting/Empty Outflow Line Elements -->
    <line x1="40" y1="65" x2="80" y2="65" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" />
    <line x1="40" y1="80" x2="70" y2="80" stroke="#475569" stroke-width="2" stroke-linecap="round" />
    <line x1="40" y1="95" x2="60" y2="95" stroke="#475569" stroke-width="2" stroke-linecap="round" />
    
    <path d="M 72 102 L 82 112 M 82 102 L 72 112" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" />
    <text x="60" y="15" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#ef4444" text-anchor="middle" letter-spacing="0.5">THE CYCLE</text>
  </g>

  <!-- MIDDLE CONNECTIVE ELEMENT: Breaking Arrow Line -->
  <g transform="translate(325, 175)">
    <path d="M 10 15 L 70 15" fill="none" stroke="#334155" stroke-width="4" stroke-dasharray="6,6" stroke-linecap="round" />
    <path d="M 65 5 L 80 15 L 65 25" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- RIGHT GRAPHIC: The $500 Safety Margin Buffer (Breaking the Chain) -->
  <g transform="translate(450, 60)" filter="url(#shadow)">
    <!-- Main Safe Financial Vault Layout -->
    <rect width="210" height="240" rx="20" fill="#1e293b" stroke="#334155" stroke-width="2" />
    
    <!-- Shield Graphic Background Accent -->
    <path d="M 105 45 C 135 45 160 35 160 35 C 160 95 135 140 105 155 C 75 140 50 95 50 35 C 50 35 75 45 105 45 Z" fill="url(#shieldGrad)" opacity="0.15" />
    
    <!-- Glowing Safe Vault Core Node -->
    <circle cx="105" cy="100" r="44" fill="#0f172a" stroke="#0284c7" stroke-width="2" />
    <circle cx="105" cy="100" r="32" fill="none" stroke="#10b981" stroke-width="6" stroke-dasharray="160,40" stroke-linecap="round" />
    
    <!-- Central Value Matrix text -->
    <text x="105" y="106" font-family="system-ui, sans-serif" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle">$500</text>
    
    <!-- Status Labels Info Group -->
    <rect x="35" y="165" width="140" height="24" rx="12" fill="#10b981" opacity="0.1" />
    <text x="105" y="181" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#10b981" text-anchor="middle" letter-spacing="0.5">STARTER BUFFER ACTIVE</text>
    
    <!-- Micro Automated Step Tracker -->
    <text x="105" y="212" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">Automated Isolation: $25/wk</text>
  </g>

  <!-- Global Footer Branding and Focus Sub-text -->
  <text x="400" y="380" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Breaking the Paycheck Cycle</text>
  <text x="400" y="406" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Move from visibility leaks to an automated safety floor, regardless of income.</text>
</svg>
